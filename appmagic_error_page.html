<style>
*{margin:0;padding:0}
body{overflow:hidden;background:#fff;width:100vw;height:100vh}
canvas{display:block;width:100vw;height:100vh;position:absolute;top:0;left:0}
#overlay{
  position:absolute;top:0;left:0;width:100vw;height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  mix-blend-mode:screen;
  background:#000;
  pointer-events:none;
  z-index:1;
}
#text{
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
  width:80%;
  max-width:720px;
}
#text svg{
  width:100%;
  height:auto;
}
#subtitle{
  font-family:'Roboto',sans-serif;
  font-weight:300;
  font-size:clamp(11px, 2.2vw, 22px);
  letter-spacing:0.28em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.65);
  margin-top:clamp(12px, 2.5vw, 32px);
}

<script>
const c = document.getElementById('c');
const gl = c.getContext('webgl',{alpha:false,depth:false,stencil:false,antialias:false})
        || c.getContext('experimental-webgl');

function resize(){
  c.width = window.innerWidth;
  c.height = window.innerHeight;
  gl.viewport(0,0,c.width,c.height);
}
window.addEventListener('resize',resize);
resize();

const SEED_X = (Math.random()*200-100).toFixed(3);
const SEED_Y = (Math.random()*200-100).toFixed(3);

const VS=`attribute vec2 a;void main(){gl_Position=vec4(a,0,1);}`;

const FS=`
precision highp float;
uniform vec2 R;
uniform float T;
const vec2 SEED=vec2(`+SEED_X+`,`+SEED_Y+`);
vec2 h2(vec2 p){p=vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3)));return -1.0+2.0*fract(sin(p)*43758.5453);}
float nse(vec2 p){vec2 i=floor(p),f=fract(p);vec2 u=f*f*f*(f*(f*6.0-15.0)+10.0);return mix(mix(dot(h2(i),f),dot(h2(i+vec2(1,0)),f-vec2(1,0)),u.x),mix(dot(h2(i+vec2(0,1)),f-vec2(0,1)),dot(h2(i+vec2(1,1)),f-vec2(1,1)),u.x),u.y);}
float fbm(vec2 p){float v=0.0,a=0.5;mat2 r=mat2(0.8,0.6,-0.6,0.8);for(int i=0;i<6;i++){v+=a*nse(p);p=r*p*2.0+100.0;a*=0.5;}return v;}
float rfbm(vec2 p){float v=0.0,a=0.5;mat2 r=mat2(0.8,0.6,-0.6,0.8);for(int i=0;i<6;i++){float n=nse(p);n=1.0-abs(n);n=n*n;v+=a*n;p=r*p*2.0+100.0;a*=0.5;}return v;}
float hfbm(vec2 p){float v=0.0,a=0.5;mat2 r=mat2(0.8,0.6,-0.6,0.8);for(int i=0;i<8;i++){v+=a*nse(p);p=r*p*2.1+50.0;a*=0.48;}return v;}
void main(){
  vec2 uv=gl_FragCoord.xy/R;float asp=R.x/R.y;vec2 p=vec2(uv.x*asp,uv.y)*2.5+SEED;float t=T;float s=t*0.04;
  vec2 q=vec2(fbm(p+vec2(0.0,0.0)+s*0.5),fbm(p+vec2(5.2,1.3)+s*0.3));
  vec2 r2=vec2(fbm(p+4.0*q+vec2(1.7,9.2)+s*0.2),fbm(p+4.0*q+vec2(8.3,2.8)+s*0.25));
  vec2 r3=vec2(fbm(p+3.0*r2+vec2(13.1,4.5)+s*0.15),fbm(p+3.0*r2+vec2(3.7,11.8)+s*0.18));
  float f=fbm(p+4.0*r2+2.0*r3);float ridge=rfbm(p+3.5*r2+1.5*r3+vec2(2.0,5.0));float ridge2=rfbm(p*1.3+3.0*r2+vec2(7.0,3.0)+s*0.1);
  float colorSel=r2.x*0.4+r2.y*0.3+r3.x*0.15+r3.y*0.15;colorSel=colorSel*0.5+0.5;colorSel=smoothstep(0.1,0.9,colorSel);
  float subSel=q.x*0.5+q.y*0.5;subSel=subSel*0.5+0.5;
  vec3 cyan=vec3(0.48,0.88,0.88);vec3 paleCyan=vec3(0.58,0.78,0.88);vec3 lavBlue=vec3(0.60,0.56,0.82);vec3 lavender=vec3(0.72,0.54,0.82);vec3 pinkLav=vec3(0.82,0.50,0.74);vec3 pink=vec3(0.92,0.48,0.64);vec3 softPink=vec3(0.86,0.56,0.66);
  vec3 col;col=mix(cyan,paleCyan,smoothstep(0.0,0.15,colorSel));col=mix(col,lavBlue,smoothstep(0.1,0.3,colorSel));col=mix(col,lavender,smoothstep(0.25,0.45,colorSel));col=mix(col,pinkLav,smoothstep(0.4,0.55,colorSel));col=mix(col,pink,smoothstep(0.5,0.7,colorSel));col=mix(col,softPink,smoothstep(0.65,0.85,colorSel));
  vec3 subColor=mix(col*0.92,col*1.08,subSel);col=mix(col,subColor,0.4);
  float vein1=smoothstep(0.65,0.85,ridge);col=mix(col,vec3(0.55,0.18,0.42),vein1*0.35);float vein2=smoothstep(0.6,0.8,ridge2);col=mix(col,vec3(0.45,0.20,0.50),vein2*0.2);float cvein=smoothstep(0.55,0.75,rfbm(p*1.1+2.5*r2+vec2(4.0,8.0)));col=mix(col,vec3(0.28,0.65,0.70),cvein*0.15);
  float flowDir=atan(r2.y,r2.x);vec2 flowVec=vec2(cos(flowDir),sin(flowDir));float alongFlow=dot(p*5.0,flowVec);float grain=hfbm(vec2(alongFlow*3.0,dot(p,vec2(-flowVec.y,flowVec.x))*8.0)+s*0.5);col*=0.94+0.12*grain;
  float streak=sin(alongFlow*25.0+nse(p*6.0+r2*3.0)*4.0);col+=streak*0.02*col;col*=0.92+0.16*smoothstep(-0.5,0.5,f);
  float temp=fbm(p*1.5+r3*2.0+vec2(20.0));col.r+=temp*0.04;col.b-=temp*0.03;
  float lum=dot(col,vec3(0.299,0.587,0.114));float sat=length(col-vec3(lum));col+=sat*0.12*(col-vec3(lum));
  float g=dot(col,vec3(0.299,0.587,0.114));col=mix(vec3(g),col,1.3);col=clamp(col,0.0,1.0);gl_FragColor=vec4(col,1.0);
}`;

function mkS(type,src){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(s));return s;}
const pg=gl.createProgram();gl.attachShader(pg,mkS(gl.VERTEX_SHADER,VS));gl.attachShader(pg,mkS(gl.FRAGMENT_SHADER,FS));gl.linkProgram(pg);
if(!gl.getProgramParameter(pg,gl.LINK_STATUS))console.error(gl.getProgramInfoLog(pg));
gl.useProgram(pg);
const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const ap=gl.getAttribLocation(pg,'a');gl.enableVertexAttribArray(ap);gl.vertexAttribPointer(ap,2,gl.FLOAT,false,0,0);
const uR=gl.getUniformLocation(pg,'R');const uT=gl.getUniformLocation(pg,'T');const t0=performance.now();
let frames=0;const WARMUP=10;
(function loop(){const now=performance.now();gl.uniform2f(uR,c.width,c.height);gl.uniform1f(uT,(now-t0)/1000.0);gl.drawArrays(gl.TRIANGLE_STRIP,0,4);frames++;if(frames<=WARMUP){requestAnimationFrame(loop);}else if(frames===WARMUP+1){const elapsed=(now-t0)/1000.0;const avgFps=WARMUP/elapsed;if(avgFps<24){return;}requestAnimationFrame(loop);}else{requestAnimationFrame(loop);}})();
</script>
